name: Regression CI

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: ezsftp-regression-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  regression:
    name: Regression (${{ matrix.batch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        batch: ["static", "dry-run-flow"]
    env:
      DOCKER_RUNNER_CACHE: /tmp/docker-runner
      DOCKER_RUNNER_PRUNE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize Docker runner cache
        run: mkdir -p /tmp/docker-runner/{images,cache,artifacts}

      - name: Static regression checks
        if: matrix.batch == 'static'
        run: bash .github/scripts/docker-runner.sh debian:bookworm-slim "apt-get update && apt-get install -y shellcheck && bash -n ezsftp.sh && shellcheck ezsftp.sh"

      - name: shfmt format check
        if: matrix.batch == 'static'
        continue-on-error: true
        run: |
          set -euo pipefail
          SHFMT_VERSION="3.11.0"
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" \
            -o /tmp/shfmt
          chmod +x /tmp/shfmt
          /tmp/shfmt -d -i 2 -ci -bn ezsftp.sh

      - name: Dry-run add/remove regression flow
        if: matrix.batch == 'dry-run-flow'
        run: |
          set -Eeuo pipefail
          TMP=$(mktemp -d)
          touch "${TMP}/fstab"
          mkdir -p "${TMP}/chroot" "${TMP}/shared" "${TMP}/keys" "${TMP}/sshd"
          CHROOT_BASE="${TMP}/chroot" SHARED_DIR="${TMP}/shared" GROUP_NAME=sftpaccess-ci \
            KEY_DIR="${TMP}/keys" FSTAB_FILE="${TMP}/fstab" SSHD_FRAG_DIR="${TMP}/sshd" \
            DRY_RUN=1 bash ./ezsftp.sh --non-interactive --action add --user ciuser
          CHROOT_BASE="${TMP}/chroot" SHARED_DIR="${TMP}/shared" GROUP_NAME=sftpaccess-ci \
            KEY_DIR="${TMP}/keys" FSTAB_FILE="${TMP}/fstab" SSHD_FRAG_DIR="${TMP}/sshd" \
            DRY_RUN=1 bash ./ezsftp.sh --non-interactive --action remove --user ciuser
